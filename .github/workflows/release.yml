name: Build & Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: soho-unlock-linux-amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            binary: soho-unlock-linux-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools protobuf-compiler

      - name: Install cross
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/soho-unlock ${{ matrix.binary }}

      - name: Download ut binary
        run: |
          ARCH=$(echo "${{ matrix.binary }}" | grep -o 'amd64\|arm64')
          curl -sL -o ut-linux-${ARCH} "https://github.com/oneclickvirt/UnlockTests/releases/latest/download/ut-linux-${ARCH}"
          chmod +x ut-linux-${ARCH}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.binary }}
            ut-linux-*
